# var_name:
#   standard_name: https://cfconventions.org/Data/cf-standard-names/current/build/cf-standard-name-table.html
#   long_name: longer descriptive name of variable
#   units: consult https://doi.org/10.5065/D6KD1WN0 for standard units or the standard name table
#   institution: Specifies where the original data was produced.
#   source: The method of production of the original data. If it was model-generated, source should name the model and its version, as specifically as could be useful. If it is observational, source should characterize it (e.g., "surface observation" or "radiosonde").
#   comment: Miscellaneous information about the data or methods used to produce it.
#   references: Published or web-based references that describe the data or methods used to produce it.

itslive_v:
  standard_name: ice_surface_velocity
  long_name: Ice surface velocity magnitude from ITS_LIVE
  units: m yr-1
  institution: NASA Jet Propulsion Laboratory (JPL), California Institute of Technology
  source: Observational - optical feature tracking of Landsat image pairs (ITS_LIVE composite, a NASA MEaSUREs project, its-live.jpl.nasa.gov)
  comment: Magnitude of the 1985-2018 average surface velocity, reprojected to glacier-specific grid and scaled to preserve ground units.
  references: https://doi.org/10.5067/6II6VW8LLWJ7

itslive_vx:
  standard_name: ice_surface_x_velocity
  long_name: Ice surface velocity in x-direction from ITS_LIVE
  units: m yr-1
  institution: NASA Jet Propulsion Laboratory (JPL), California Institute of Technology
  source: Observational - optical feature tracking of Landsat image pairs (ITS_LIVE composite, a NASA MEaSUREs project, its-live.jpl.nasa.gov)
  comment: x-component of 1985-2018 average surface velocity, reprojected to glacier-specific grid and scaled to preserve ground units.
  references: https://doi.org/10.5067/6II6VW8LLWJ7

itslive_vy:
  standard_name: ice_surface_y_velocity
  long_name: Ice surface velocity in y-direction from ITS_LIVE
  units: m yr-1
  institution: NASA Jet Propulsion Laboratory (JPL), California Institute of Technology
  source: Observational - optical feature tracking of Landsat image pairs (ITS_LIVE composite, a NASA MEaSUREs project, its-live.jpl.nasa.gov)
  comment: y-component of 1985-2018 average surface velocity, reprojected to glacier-specific grid and scaled to preserve ground units.
  references: https://doi.org/10.5067/6II6VW8LLWJ7

# topo uses COPDEM (Copernicus DEM) within DTC Glaciers
topo:
  standard_name: surface_elevation
  long_name: Surface elevation from Copernicus DEM
  units: m
  institution: ESA / Copernicus Programme
  source: Observational - Copernicus DEM from Sentinel-1 and SRTM satellite data
  comment: Elevation data from Copernicus DEM (30m and 90m resolution), reprojected to glacier-specific grid. No-data values are set to NaN.
  references: https://doi.org/10.5270/ESA-c5d3d65

topo_smoothed:
  standard_name: surface_elevation_smoothed
  long_name: Smoothed surface elevation from Copernicus DEM
  units: m
  institution: ESA / Copernicus Programme, post-processed by OGGM
  source: Copernicus DEM data processed with Gaussian blur
  comment: Smoothed version of the Copernicus DEM using a Gaussian filter with user-defined window. Reprojected to glacier-specific grid.
  references: https://doi.org/10.5270/ESA-c5d3d65

topo_valid_mask:
  standard_name: surface_elevation_quality_flag
  long_name: Validity mask of Copernicus DEM surface elevation
  units: '-'
  institution: ESA / Copernicus Programme, post-processed by OGGM
  source: Validity mask derived from Copernicus DEM
  comment: 1 indicates valid DEM data; 0 indicates missing or invalid values.
  references: https://doi.org/10.5270/ESA-c5d3d65

glacier_mask:
  standard_name: ice_binary_mask
  long_name: Glacier mask derived from Randolph Glacier Inventory (RGI v6)
  units: '-'
  institution: RGI Consortium
  source: Rasterized glacier extent from RGI. RGI definitions are manually and semi-automatically delineated glacier outlines from satellite imagery.
  comment: 1 indicates glacier-covered pixel; 0 indicates no ice.
  references: https://doi.org/10.7265/4m1f-gd79

glacier_ext:
  standard_name: land_ice_boundary_binary_mask
  long_name: Glacier boundary derived from Randolph Glacier Inventory (RGI v6)
  units: '-'
  institution: RGI Consortium
  source: Rasterized glacier boundary from RGI. RGI definitions are manually and semi-automatically delineated glacier outlines from satellite imagery.
  comment: Marks the boundary pixels of the glacier outline, excluding nunataks.
  references: https://doi.org/10.7265/4m1f-gd79

consensus_ice_thickness:
  standard_name: consensus_ice_thickness
  long_name: Ice thickness from Farinotti et al. 2019 consensus estimate
  units: m
  institution: International consortium (ETH Zurich, WSL, University of Fribourg, et al.)
  source: Consensus estimate combining six glacier ice-thickness inversion models constrained by observations (Farinotti et al. 2019)
  comment: Ensemble-mean thickness resampled to the glacier-specific grid; represents estimates around the RGI v6 inventory epoch (~2000). Zero or negative values are masked to NaN.
  references: https://doi.org/10.1038/s41561-019-0300-3

hugonnet_dhdt:
  standard_name: ice_elevation_change_rate
  long_name: Glacier elevation change rate from geodetic mass balance estimates
  units: m yr-1
  institution: ETH Zurich / University of Toulouse / University of Oslo
  source: Geodetic measurements from multi-temporal DEMs (optical stereo from ASTER)
  comment: Rate of surface elevation change (dh/dt) derived for 2000-2019; reprojected to the glacier-specific grid. Values outside data coverage remain NaN.
  references: https://www.nature.com/articles/s41586-021-03436-z

millan_ice_thickness:
  standard_name: millan_ice_thickness
  long_name: Ice thickness from Millan et al. 2022
  units: m
  institution: University of California, Irvine; CNRS / IGE; University Grenoble Alpes
  source: Mass-conservation inversion constrained by multi-mission surface velocities and surface mass balance (Millan et al. 2022)
  comment: Ice thickness estimated from mass-conservation inversion using multi-mission velocity mosaics (SAR/optical, ~2000-2018) and SMB; reprojected to glacier-specific grid. Zero or negative values masked to NaN.
  references: https://doi.org/10.1038/s41561-021-00885-z

millan_v:
  standard_name: millan_ice_surface_velocity
  long_name: Ice surface velocity magnitude from Millan et al. 2022
  units: m yr-1
  institution: University of California, Irvine; CNRS / IGE; University Grenoble Alpes
  source: Multi-mission surface velocity mosaic from SAR and optical feature tracking (Sentinel-1, Landsat-8, TerraSAR-X/TanDEM-X, ALOS)
  comment: Multi-year (~2000-2018) average surface velocity magnitude, reprojected to glacier-specific grid; resampled to preserve ground units.
  references: https://doi.org/10.1038/s41561-021-00885-z

millan_vx:
  standard_name: millan_ice_surface_x_velocity
  long_name: Ice surface velocity in x-direction from Millan et al. 2022
  units: m yr-1
  institution: University of California, Irvine; CNRS / IGE; University Grenoble Alpes
  source: Multi-mission surface velocity mosaic from SAR and optical feature tracking (Sentinel-1, Landsat-8, TerraSAR-X/TanDEM-X, ALOS)
  comment: Multi-year (~2000-2018) average x-component of surface velocity, reprojected to glacier-specific grid; resampled to preserve ground units.
  references: https://doi.org/10.1038/s41561-021-00885-z

millan_vy:
  standard_name: millan_ice_surface_y_velocity
  long_name: Ice surface velocity in y-direction from Millan et al. 2022
  units: m yr-1
  institution: University of California, Irvine; CNRS / IGE; University Grenoble Alpes
  source: Multi-mission surface velocity mosaic from SAR and optical feature tracking (Sentinel-1, Landsat-8, TerraSAR-X/TanDEM-X, ALOS)
  comment: Multi-year (~2000-2018) average y-component of surface velocity, reprojected to glacier-specific grid; resampled to preserve ground units.
  references: https://doi.org/10.1038/s41561-021-00885-z

wgms_mb:
  standard_name: specific_surface_mass_balance
  long_name: Glacier-wide specific mass balance from WGMS observations
  units: kg m-2 yr-1
  institution: World Glacier Monitoring Service (WGMS)
  source: In-situ measurements from glaciological surveys
  comment: Annual specific (area-weighted) mass balance observations compiled by WGMS from direct glaciological measurements at monitored glaciers.
  references: https://doi.org/10.5904/wgms-fog-2023-12

wgms_mb_unc:
  standard_name: specific_surface_mass_balance_uncertainty
  long_name: Uncertainty in glacier-wide specific mass balance from WGMS
  units: kg m-2 yr-1
  institution: World Glacier Monitoring Service (WGMS)
  source: Uncertainty estimates from WGMS measurements
  comment: Estimated uncertainty in annual specific mass balance, accounting for measurement and interpolation errors in WGMS observations.
  references: https://doi.org/10.5904/wgms-fog-2023-12

sfc_type_data:
  standard_name: glacier_surface_classification
  long_name: Glacier surface type classification from Sentinel-2
  units: '-'
  institution: ENVEO
  source: Spectral classification of Sentinel-2 multi-spectral imagery (10m) using threshold-based method with 6S radiative transfer model and CAMS atmospheric parameters (Cremona et al. 2025)
  comment: Classification of glacier surface facies derived from Sentinel-2 scenes (2015-23, <15% cloud cover). Classes include snow, clean glacier ice, debris-covered ice, and firn/old snow/bright ice (seasonal). Reprojected to glacier-specific grid.
  references: https://doi.org/10.1017/jog.2025.1

sfc_type_uncertainty:
  standard_name: glacier_surface_classification_uncertainty
  long_name: Uncertainty in glacier surface type classification from Sentinel-2
  units: '-'
  institution: ENVEO
  source: Uncertainty estimates from spectral classification algorithm (Cremona et al. 2025)
  comment: Estimated classification uncertainty in surface facies determination. Based on spectral reflectance thresholds and reclassification scheme.
  references: https://doi.org/10.1017/jog.2025.1

sfc_type_snowline:
  standard_name: equilibrium_line_altitude
  long_name: Snowline altitude from Sentinel-2 surface classification
  units: m
  institution: ENVEO
  source: Snowline derived from snow-covered area fraction (SCAF) computed from surface type classification (Cremona et al. 2025)
  comment: Altitude of snowline (transient equilibrium line) determined from snow-covered area fraction derived via surface type classification. Represents the boundary between snow and firn/ice/debris on the glacier surface; computed from Sentinel-2 facies classification (2015-23).
  references: https://doi.org/10.1017/jog.2025.1

# OGGM Model output
# 'units' and 'long_name' use the model output attributes (in update_metadata)

area:
  standard_name: glacier_area
  long_name: Glacier area
  units: km2
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled glacier area from dynamical model evolution.
  comment: Total glacier surface area on the chosen glacier grid.
  references: https://doi.org/10.5194/gmd-12-909-2019

volume:
  standard_name: glacier_volume
  long_name: Glacier volume
  units: km3
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled glacier volume from dynamical model evolution.
  comment: Total glacier ice volume on the chosen glacier grid.
  references: https://doi.org/10.5194/gmd-12-909-2019

length:
  standard_name: glacier_length
  long_name: Glacier length
  units: m
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled glacier length from dynamical model evolution.
  comment: Distance from the glacier terminus to the highest grid point along the centerline.
  references: https://doi.org/10.5194/gmd-12-909-2019

specific_mb:
  standard_name: specific_surface_mass_balance
  long_name: Specific mass balance (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled specific glacier-wide mass balance (annual sum of accumulation and ablation).
  comment: Annual mean specific mass balance for the entire glacier area.
  references: https://doi.org/10.5194/gmd-12-909-2019

specific_mb_calendar_cum:
  standard_name: specific_surface_mass_balance_cumulative
  long_name: Cumulative specific mass balance (calendar year)
  units: kg m-2
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled cumulative specific glacier-wide mass balance (calendar year).
  comment: Cumulative annual specific mass balance from January 1 through end of calendar year.
  references: https://doi.org/10.5194/gmd-12-909-2019

off_area:
  standard_name: off_glacier_area
  long_name: Off-glacier area
  units: km2
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled area of the grid domain outside glacier boundaries.
  comment: Total area of the glacier grid domain that is not covered by glacier ice.
  references: https://doi.org/10.5194/gmd-12-909-2019

on_area:
  standard_name: on_glacier_area
  long_name: On-glacier area
  units: km2
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled area of the glacier-covered domain.
  comment: Total area of glacier ice on the chosen glacier grid.
  references: https://doi.org/10.5194/gmd-12-909-2019

melt_off_glacier:
  standard_name: off_glacier_surface_melt_flux
  long_name: Off-glacier melt (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled annual surface melt on off-glacier areas.
  comment: Annual sum of surface melt (ablation) on the off-glacier portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

melt_on_glacier:
  standard_name: on_glacier_surface_melt_flux
  long_name: On-glacier melt (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled annual surface melt on glacier-covered areas.
  comment: Annual sum of surface melt (ablation) on the glacier-covered portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

liq_prcp_off_glacier:
  standard_name: off_glacier_liquid_water_input
  long_name: Off-glacier liquid precipitation (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled annual liquid precipitation (rain) on off-glacier areas.
  comment: Annual sum of precipitation falling as rain on the off-glacier portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

liq_prcp_on_glacier:
  standard_name: on_glacier_liquid_water_input
  long_name: On-glacier liquid precipitation (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled annual liquid precipitation (rain) on glacier-covered areas.
  comment: Annual sum of precipitation falling as rain on the glacier-covered portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

snowfall_off_glacier:
  standard_name: off_glacier_solid_water_input
  long_name: Off-glacier solid precipitation (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled annual solid precipitation (snow) on off-glacier areas.
  comment: Annual sum of precipitation falling as snow on the off-glacier portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

snowfall_on_glacier:
  standard_name: on_glacier_solid_water_input
  long_name: On-glacier solid precipitation (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled annual solid precipitation (snow) on glacier-covered areas.
  comment: Annual sum of precipitation falling as snow on the glacier-covered portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

runoff:
  standard_name: glacier_runoff_flux
  long_name: Glacier runoff (annual)
  units: kg m-2 yr-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled annual runoff from melt and liquid precipitation using fixed-gauge method.
  comment: Annual glacier runoff from sum of annual melt and liquid precipitation on and off the glacier using a fixed-gauge with glacier minimum reference area from year 2000.
  references: https://doi.org/10.5194/gmd-12-909-2019

melt_off_glacier_monthly:
  standard_name: off_glacier_surface_melt_flux_monthly
  long_name: Off-glacier melt (monthly)
  units: kg m-2 month-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled monthly surface melt on off-glacier areas.
  comment: Monthly sum of surface melt (ablation) on the off-glacier portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

melt_on_glacier_monthly:
  standard_name: on_glacier_surface_melt_flux_monthly
  long_name: On-glacier melt (monthly)
  units: kg m-2 month-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled monthly surface melt on glacier-covered areas.
  comment: Monthly sum of surface melt (ablation) on the glacier-covered portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

liq_prcp_off_glacier_monthly:
  standard_name: off_glacier_liquid_water_input_monthly
  long_name: Off-glacier liquid precipitation (monthly)
  units: kg m-2 month-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled monthly liquid precipitation (rain) on off-glacier areas.
  comment: Monthly sum of precipitation falling as rain on the off-glacier portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

liq_prcp_on_glacier_monthly:
  standard_name: on_glacier_liquid_water_input_monthly
  long_name: On-glacier liquid precipitation (monthly)
  units: kg m-2 month-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled monthly liquid precipitation (rain) on glacier-covered areas.
  comment: Monthly sum of precipitation falling as rain on the glacier-covered portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

snowfall_off_glacier_monthly:
  standard_name: off_glacier_solid_water_input_monthly
  long_name: Off-glacier solid precipitation (monthly)
  units: kg m-2 month-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled monthly solid precipitation (snow) on off-glacier areas.
  comment: Monthly sum of precipitation falling as snow on the off-glacier portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

snowfall_on_glacier_monthly:
  standard_name: on_glacier_solid_water_input_monthly
  long_name: On-glacier solid precipitation (monthly)
  units: kg m-2 month-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled monthly solid precipitation (snow) on glacier-covered areas.
  comment: Monthly sum of precipitation falling as snow on the glacier-covered portion of the domain.
  references: https://doi.org/10.5194/gmd-12-909-2019

runoff_monthly:
  standard_name: glacier_runoff_flux_monthly
  long_name: Glacier runoff (monthly)
  units: kg m-2 month-1
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled monthly runoff from melt and liquid precipitation using fixed-gauge method.
  comment: Monthly glacier runoff from sum of monthly melt and liquid precipitation on and off the glacier using a fixed-gauge with glacier minimum reference area from year 2000.
  references: https://doi.org/10.5194/gmd-12-909-2019

runoff_monthly_cumulative:
  standard_name: glacier_runoff_flux_monthly_cumulative
  long_name: Glacier runoff cumulative (monthly)
  units: kg m-2
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled cumulative monthly runoff from melt and liquid precipitation using fixed-gauge method.
  comment: Cumulative monthly glacier runoff from January 1 through end of month, using a fixed-gauge with glacier minimum reference area from year 2000.
  references: https://doi.org/10.5194/gmd-12-909-2019

snowline:
  standard_name: equilibrium_line_altitude
  long_name: Snowline altitude (modelled)
  units: m
  institution: OGGM / DTC-Glaciers
  source: OGGM modelled snowline (transient equilibrium line) altitude.
  comment: Altitude of the snowline (transient equilibrium line) where annual accumulation equals annual ablation; computed from surface mass balance profile.
  references: https://doi.org/10.5194/gmd-12-909-2019

prcp:
  standard_name: total precipitation
  long_name: Total precipitation (monthly)
  units: kg m-2 day-1
  institution: OGGM / GSWP3_W5E5
  source: Monthly total precipitation (rain + snow) from the ISIMIP3a dataset.
  comment: Monthly precipitation for the entire glacier area.
  references: https://data.isimip.org/10.48364/ISIMIP.982724

temp:
  standard_name: temperature
  long_name: Near-surface air temperature
  units: K
  institution: OGGM / GSWP3_W5E5
  source: Monthly mean temperature from the ISIMIP3a dataset.
  comment: Mean temperature for the entire glacier area.
  references: https://data.isimip.org/10.48364/ISIMIP.982724

temp_std:
  standard_name: temperature (standard deviation)
  long_name: Standard deviation of near-surface air temperature
  units: kg m-2 day-1
  institution: OGGM / GSWP3_W5E5
  source: Monthly mean temperature from the ISIMIP3a dataset.
  comment: Standard deviation of the mean temperature for the entire glacier area.
  references: https://data.isimip.org/10.48364/ISIMIP.982724
